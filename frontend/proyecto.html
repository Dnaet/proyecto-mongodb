
<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./css/brite.css" />
    <link rel="stylesheet" href="./css/estilos.css" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./scripts/proyecto.js"></script>

    <title>Registro de Proyectos</title>
</head>

<body>

    <div class="container">
        <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
            <div class="container-fluid">
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="./datos.html">Datos de Proyectos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./formulario.html">Formulario Registro
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="./proyecto.html">Proyectos
                            </a>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <br>

    <div class="container">
        <p class="h3">Registro de Proyecto</p>
        <br>

        <form id="formularioProyecto">

            <p class="h5">Datos del Proyecto</p>
            <hr>
            <br>

            <div class="row">
                <div class="col">
                    <label for="inputNombreProyecto" class="form-label">Nombre del Proyecto:</label>
                    <input type="text" id="inputNombreProyecto" class="form-control">
                </div>

                <div class="col">
                    <label for="selectUsuario" class="form-label">Usuario Responsable:</label>
                    <select id="selectUsuario" class="form-select">
                        <option value="">
                            Seleccione un usuario...
                        </option>
                    </select>
                </div>
            </div>

            <br>

            <div class="row">
                <div class="col">
                    <label for="inputDescripcion" class="form-label">Descripción:</label>
                    <textarea id="inputDescripcion" class="form-control" rows="3"></textarea>
                </div>
            </div>

            <br>

            <div class="row">
                <div class="col">
                    <label for="inputFechaInicio" class="form-label">Fecha Inicio:</label>
                    <input type="date" id="inputFechaInicio" class="form-control">
                </div>

                <div class="col">
                    <label for="inputFechaFin" class="form-label">Fecha Término:</label>
                    <input type="date" id="inputFechaFin" class="form-control">
                </div>
            </div>

            <br>

            <div class="row">
                <div class="col">
                    <label for="selectEstado" class="form-label">Estado:</label>
                    <select id="selectEstado" class="form-select">
                        <option value="">Seleccione...</option>
                        <option value="Pendiente">Pendiente</option>
                        <option value="En Proceso">En Proceso</option>
                        <option value="Finalizado">Finalizado</option>
                    </select>
                </div>
                <div class="col">
                    <label for="inputPresupuesto" class="form-label">Presupuesto:</label>
                    <input type="number" id="inputPresupuesto" class="form-control">
                </div>
            </div>

            <br>

            <div class="row">
                <div class="col">
                    <label for="selectPrioridad" class="form-label">Prioridad:</label>
                    <select id="selectPrioridad" class="form-select">
                        <option value="">Seleccione...</option>
                        <option value="Baja">Baja</option>
                        <option value="Media">Media</option>
                        <option value="Alta">Alta</option>
                    </select>
                </div>

                <div class="col">
                    <label for="inputCategoria" class="form-label">Categoría:</label>
                    <input type="text" id="inputCategoria" class="form-control">
                </div>

                <div class="col">
                    <label for="inputAvance" class="form-label">Avance (%):</label>
                    <input type="number" id="inputAvance" class="form-control" min="0" max="100">
                </div>
            </div>

            <br>

            <div class="row">
                <div class="col d-flex justify-content-end">
                    <input type="reset" value="Cancelar" class="btn btn-secondary me-2">
                    <button type="button" class="btn btn-primary" onclick="validarProyecto()">Guardar Proyecto</button>
                </div>
            </div>

        </form>
    </div>

</body>

</html>
```
