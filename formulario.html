<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="./assets/images/among_us_player_red_icon_156942.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/superhero.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./scripts/formulario.js"></script>

    <title>Document</title>
</head>

<body>
    <div class="container">
        <p class="h3">Formulario de Registro</p>
        <br>

        <form action="">
            <div class="container">
                <div class="row">
                    <div class="col">
                        <label for="inputNombre" class="form-label">Nombre Completo:</label>
                        <input type="text" name="" id="inputNombre" class="form-control" required>
                    </div>
                    <div class="col">
                        <label for="inputRut" class="form-label">Rut:</label>
                        <input type="text" name="" id="inputRut" class="form-control">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputEmail" class="form-label">Correo Electrónico:</label>
                        <input type="email" name="" id="inputEmail" class="form-control" required>
                    </div>
                    <div class="col">
                        <label for="inputCelular" class="form-label">Celular Contacto:</label>
                        <input type="tel" name="" id="inputCelular" class="form-control">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputNacimiento" class="form-label">Fecha Nacimiento:</label>
                        <input type="date" name="" id="inputNacimiento" class="form-control">
                    </div>

                    <div class="col">
                        <label for="selectNacionalidad" class="form-label">Nacionalidad:</label>
                        <select name="" id="selectNacionalidad" class="form-select">
                            <option value="1">Chilena</option>
                            <option value="2">Argentina</option>
                            <option value="3">Venezolana</option>
                            <option value="4">Peruana</option>
                        </select>
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputContrasena" class="form-label">Contraseña</label>
                        <input type="password" name="contrasena" id="inputContrasena" class="form-control">
                    </div>
                    <div class="col">
                        <label for="inputRepetirContrasena" class="form-label">Repetir Contraseña</label>
                        <input type="password" name="contrasena" id="inputRepetirContrasena" class="form-control">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputDireccion" class="form-label">Dirección:</label>
                        <input type="text" name="" id="inputDireccion" class="form-control">
                    </div>

                    <div class="col">
                        <label for="inputFoto" class="form-label">Foto Personal:</label>
                        <input type="file" name="foto" id="inputFoto" class="form-control">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <p>Género:</p>
                        <div class="form-check">
                            <input type="radio" name="radioGenero" id="radioFemenino" value="F" class="form-check-input">
                            <label for="radioFemenino" class="form-check-label">Femenino</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" name="radioGenero" id="radioMasculino" value="M" class="form-check-input">
                            <label for="radioFemenino" class="form-check-label">Masculino</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" name="radioGenero" id="radioMOtro" value="O" class="form-check-input">
                            <label for="radioMOtro" class="form-check-label">Otro...</label>
                        </div>
                    </div>
                    <div class="col">
                        
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col d-flex justify-content-end">
                        <input type="reset" value="Cancelar" class="btn btn-secondary me-2">
                        <!-- <input type="submit" value="Enviar" class="btn btn-primary"> -->
                         <button type="button" class="btn btn-primary" onclick="validarFormulario()">Enviar</button>
                    </div>
                </div>
            </div>
        </form>
    </div>


</body>

</html>
